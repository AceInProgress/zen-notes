<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZenNotes | Minimalist Editor</title>
  
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-container">
    
    <div class="sidebar-container">
      <aside class="sidebar">
        <nav>
          <h3>My Notes</h3>
          <ul>
            <li><a href="#">Coding Goals</a></li>
            <li><a href="#">M1 Savings</a></li>
          </ul>
          <div class="savings-tracker">
  <h4>M1 Goal: $400</h4>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" style="width: 0%;"></div>
  </div>
  <p id="days-to-go">Target Start: May 25th</p>
</div>
        </nav>
      </aside>
    </div>

    <main>
      <section class="editor-container">
        <h1 contenteditable="true">Untitled Note</h1>
        <textarea placeholder="Start typing..."></textarea>
        <button id="clear-btn">Clear Text</button>
      </section>
    </main>

  </div>
  <script src="script.js"></script>
</body>
</html>
